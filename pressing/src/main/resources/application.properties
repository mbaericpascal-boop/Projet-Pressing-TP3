spring.application.name=tp-pressing

# SQLite - persistance
spring.datasource.url=jdbc:sqlite:${user.home}/pressing-data/pressing.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Port serveur
server.port=8082

# Upload fichiers
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Email Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:mbaericpascal@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false

# Thymeleaf
spring.thymeleaf.cache=false

# Sécurité

app.vetements.desc=Les vêtements sont affichés avec photo, matière, couleur et catégorie.
app.sort.nom=Nom
app.sort.couleur=Couleur
app.sort.matiere=Matière
app.sort.potentiel=Potentiel
app.sort.asc=Ascendant
app.sort.desc=Descendant
app.matiere.label=Matière :
app.potentiel.label=Potentiel :
app.aucun.resultat=Aucun vêtement ne correspond à votre recherche.
app.nom.placeholder=Nom complet
app.email.placeholder=contact@exemple.com
app.choisir.vetement=Choisir un vêtement