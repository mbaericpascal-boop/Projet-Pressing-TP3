<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{app.historique} + ' | Pressing Pro'">Historique des commandes | Pressing Pro</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <style>
        .btn-valider  { background:#2196F3; color:#fff; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; text-decoration:none; display:inline-block;}
        .btn-terminer { background:#4CAF50; color:#fff; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; text-decoration:none; display:inline-block;}
        .btn-annuler  { background:#f44336; color:#fff; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; text-decoration:none; display:inline-block;}
        .btn-facture  { background:#FF9800; color:#fff; border:none; padding:8px 15px; border-radius:6px; text-decoration:none; display:inline-block; }
        .statut-EN_ATTENTE { background: #fff3e0; color:#e65100; padding: 4px 8px; border-radius: 4px; font-weight:bold; }
        .statut-EN_COURS   { background: #e3f2fd; color:#0d47a1; padding: 4px 8px; border-radius: 4px; font-weight:bold; }
        .statut-TERMINEE   { background: #e8f5e9; color:#1b5e20; padding: 4px 8px; border-radius: 4px; font-weight:bold; }
        .table-wrapper { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<header class="hero small-hero">
    <div class="hero-content">
        <h1 th:text="#{app.historique}">Historique des commandes</h1>
        <p th:text="#{app.commande.desc}">Gestion du cycle de vie des traitements clients.</p>
        <a class="hero-button" th:href="@{/commandes/accueil}" th:text="#{app.langue.fr == 'Français' ? 'Retour à l\'accueil' : 'Back to home'}">Retour à l'accueil</a>
    </div>
</header>
<main>
    <section class="section">
        <div class="container">
            <div class="table-wrapper">
                <table style="width:100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid #eee; text-align: left;">
                            <th>ID</th>
                            <th th:text="#{app.nom.client}">Client</th>
                            <th th:text="#{app.recherche.titre}">Détails</th>
                            <th>Statut</th>
                            <th th:text="#{app.sort.desc == 'Descendant' ? 'Prix (XAF)' : 'Price (XAF)'}">Prix (XAF)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="commande : ${commandes}" style="border-bottom: 1px solid #f5f5f5;">
                            <td th:text="'#' + ${commande.id}"></td>
                            <td>
                                <strong th:text="${commande.client}"></strong><br/>
                                <small th:text="${commande.emailClient}"></small>
                            </td>
                            <td>
                                <span th:text="${commande.nombreHabits} + ' ' + #{app.nb.habits}"></span><br/>
                                <small th:text="${commande.typeCommande}"></small>
                            </td>
                            <td>
                                <span th:classappend="'statut-' + ${commande.statut}" th:text="${commande.statut}"></span>
                            </td>
                            <td th:text="${commande.prixTotal} + ' XAF'"></td>
                            <td>
                                <a th:if="${commande.statut == 'EN_ATTENTE'}" th:href="@{'/commandes/' + ${commande.id} + '/valider'}" class="btn-valider" th:text="#{app.sort.asc == 'Ascendant' ? 'Valider' : 'Validate'}">Valider</a>
                                <a th:if="${commande.statut == 'EN_COURS'}" th:href="@{'/commandes/' + ${commande.id} + '/terminer'}" class="btn-terminer" th:text="#{app.sort.asc == 'Ascendant' ? 'Terminer' : 'Finish'}">Terminer</a>
                                <a th:href="@{'/commandes/' + ${commande.id} + '/facture'}" target="_blank" class="btn-facture">PDF</a>
                                <a th:href="@{'/commandes/' + ${commande.id} + '/supprimer'}" style="color:red; font-size: 11px; margin-left: 10px;" onclick="return confirm('Supprimer ?')">X</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div th:if="${#lists.isEmpty(commandes)}" style="text-align:center; padding: 20px;" th:text="#{app.aucun.resultat}">Aucune commande.</div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
