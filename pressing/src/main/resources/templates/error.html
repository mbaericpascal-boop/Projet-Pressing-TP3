<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Erreur</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .error-container {
            text-align: center;
            padding: 80px 20px;
        }
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #e74c3c;
        }
        .error-message {
            font-size: 20px;
            color: #555;
            margin: 20px 0;
        }
        .btn-retour {
            display: inline-block;
            padding: 12px 30px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
        }
        .btn-retour:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">⚠️</div>
        <div class="error-message" th:text="${erreurMessage}">
            Une erreur inattendue s'est produite.
        </div>
        <p style="color:#888; font-size:14px;" th:text="${erreurDetail}"></p>
        <a href="/commandes/historique" class="btn-retour">
            ← Retour à l'historique
        </a>
    </div>
</body>
</html>
