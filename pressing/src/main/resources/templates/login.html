<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion Administration | Pressing</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body class="login-page">
<div class="login-box">
    <div class="login-header">
        <h1>Administration</h1>
        <p>Accès sécurisé au système de gestion</p>
    </div>
    
    <form method="post" th:action="@{/login}">
        <div th:if="${param.error}" class="error-alert" style="background: #ffebee; color: #c62828; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; border-left: 4px solid #c62828;">
            Identifiants invalides. Veuillez réessayer.
        </div>

        <div th:if="${param.logout}" class="info-alert" style="background: #e3f2fd; color: #1565c0; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px;">
            Vous avez été déconnecté avec succès.
        </div>

        <div class="form-group">
            <label>Identifiant administrateur</label>
            <input type="text" name="username" placeholder="Nom d'utilisateur" required autofocus />
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>Mot de passe</label>
            <input type="password" name="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="login-button" style="margin-top: 25px; width: 100%; background: #2c3e50; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;">
            Se connecter
        </button>
    </form>
    
    <div class="login-footer" style="margin-top: 20px; text-align: center; font-size: 12px; color: #7f8c8d;">
        <p>Copyright © 2026 Professional Pressing Management System</p>
    </div>
</div>
</body>
</html>
