<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.voir.vetements}">Catalogue Clients | Pressing</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .search-container { margin: 20px 0; text-align: center; }
        .search-input { padding: 12px; width: 60%; border-radius: 25px; border: 1px solid #ddd; font-size: 16px; }
        .client-section { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-bottom: 30px; color: #333; }
        .vetements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .vetement-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .vetement-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .badge { background: #3498db; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <header class="hero small-hero">
        <div class="hero-content">
            <h1 th:text="#{app.recherche.titre}">Catalogue des Vêtements</h1>
            <p th:text="#{app.vetements.desc}">Visualisez les dépôts classés par propriétaire.</p>
            <a th:href="@{/commandes/accueil}" class="hero-button" th:text="#{app.langue.fr == 'Français' ? 'Retour Accueil' : 'Back Home'}">Retour Accueil</a>
        </div>
    </header>

    <main class="container">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" onkeyup="filtrerTout()" th:placeholder="#{app.nom.placeholder}">
        </div>

        <div th:each="entry : ${catalogue}" class="client-section">
            <h2 class="client-header" style="border-left: 5px solid #3498db; padding-left: 15px; margin-bottom: 20px;">
                <span th:text="#{app.nom.client}">Dépôts de</span> : <span class="client-name" th:text="${entry.key}">Nom Client</span>
            </h2>
            
            <div class="vetements-grid">
                <div th:each="v : ${entry.value}" class="vetement-card">
                    <!-- CORRECTION IMAGE ICI -->
                    <img th:src="@{'/images/' + ${v.id} + '.png'}" th:alt="#{app.aucune.photo}">
                    
                    <h4 th:text="${v.nom}" style="margin: 10px 0;">Nom</h4>
                    <p style="font-size: 14px; color: #666;">
                        <span th:text="#{app.matiere}">Matière</span>: <strong th:text="${v.matiere}"></strong><br>
                        <span th:text="#{app.couleur}">Couleur</span>: <strong th:text="${v.couleur}"></strong>
                    </p>
                    <span class="badge" th:text="${v.potentielColoration} + ' ' + #{app.sort.potentiel}"></span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function filtrerTout() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let sections = document.getElementsByClassName('client-section');
            for (let section of sections) {
                let cards = section.getElementsByClassName('vetement-card');
                let clientName = section.querySelector('.client-name').innerText.toLowerCase();
                let hasVisibleCard = false;
                for (let card of cards) {
                    let text = card.innerText.toLowerCase();
                    if (text.includes(input) || clientName.includes(input)) {
                        card.style.display = "";
                        hasVisibleCard = true;
                    } else { card.style.display = "none"; }
                }
                section.style.display = hasVisibleCard ? "" : "none";
            }
        }
    </script>
</body>
</html>
