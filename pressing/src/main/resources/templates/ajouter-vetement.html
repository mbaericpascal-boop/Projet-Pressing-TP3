<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajouter un vêtement | Stock Pressing</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<header class="hero small-hero">
    <div class="hero-content">
        <h1>Gestion du Stock</h1>
        <p>Ajoutez de nouveaux articles pour les rendre disponibles à la commande.</p>
        <a class="hero-button" th:href="@{/commandes/accueil}">Retour à l'accueil</a>
    </div>
</header>
<main>
    <section class="section section-order">
        <div class="container">
            <div class="order-panel" style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                
                <h2 style="margin-bottom: 20px; color: #2c3e50;">Nouveau Vêtement</h2>
                
                <form class="order-form" th:action="@{/commandes/vetements/ajouter}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Désignation de l'article</label>
                        <input type="text" name="nom" placeholder="Ex: Chemise, Pantalon..." required />
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                        <div class="form-group">
                            <label>Matière principale</label>
                            <input type="text" name="matiere" placeholder="Coton, Lin..." required />
                        </div>
                        <div class="form-group">
                            <label>Couleur dominante</label>
                            <input type="text" name="couleur" placeholder="Bleu, Blanc..." required />
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 15px;">
                        <label>Indice de coloration (1-10)</label>
                        <input type="number" name="potentielColoration" min="1" max="10" value="5" required />
                    </div>

                    <div class="form-group" style="margin-top: 15px;">
                        <label>Photographie du vêtement</label>
                        <input type="file" name="file" accept="image/*" style="border: 1px dashed #ccc; padding: 10px; width: 100%;" required/>
                    </div>

                    <div class="form-actions" style="margin-top: 30px;">
                        <button type="submit" style="width: 100%; padding: 15px; font-size: 18px; background:#00b4d8; color:white; border:none; border-radius:8px; cursor:pointer;">Enregistrer l'article</button>
                    </div>
                </form>

                <div th:if="${messageSucces}" style="margin-top:20px; padding:15px; background:#e8f5e9; color:#2e7d32; border-radius:6px; text-align:center;" th:text="${messageSucces}"></div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
